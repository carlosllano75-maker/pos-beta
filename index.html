<!DOCTYPE html> 
<html lang="es"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> 
  <title>LA BODEGUITA PRO - Multi-Venta</title>
  <meta name="theme-color" content="#2c3e50">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style> 
    :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --bg: #f4f7f6; --blue: #3498db; --warning: #f39c12; --danger: #e74c3c; }
    body{font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:#333; margin:0; padding-bottom:60px;} 
    header{background: linear-gradient(135deg, var(--primary) 0%, #000 100%); padding:15px; text-align:center; color:white; border-bottom:4px solid var(--accent); position: sticky; top:0; z-index:1000;} 
    .alerta-backup { background: var(--warning); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 14px; display: none; cursor: pointer; }
    .menu-superior{display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; background:#ecf0f1; padding:10px;}
    .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; padding:10px} 
    .card{background:white; border-radius:10px; padding:12px; text-align:center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee;} 
    .stock-bajo { border: 2px solid var(--danger) !important; background: #fff5f5; }
    .aviso-reponer { color: var(--danger); font-size: 10px; font-weight: bold; display: block; }
    button{padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:bold; cursor:pointer;} 
    .btn-venta{background:var(--success); width:95%; margin:10px auto; display:block; font-size:1.1em; padding:15px;}
    .lista{background:white; padding:15px; border-radius:12px; margin:10px; border:1px solid #ddd;} 
    .item-pedido{display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; border-bottom:1px solid #eee; padding:5px 0}
    input, select{padding:12px; border-radius:8px; border:1px solid #ccc; width:92%; margin:8px auto; display:block; font-size:16px;}
    .badge{background:var(--primary); color:white; padding:3px 8px; border-radius:5px; font-size:0.75em;}
    .excel-tools { background: #e8f4fd; padding: 10px; border-radius: 10px; margin: 10px; display: flex; gap: 5px; justify-content: center; border: 1px solid #3498db; }
    #ticket-wrapper { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; overflow-y:auto;}
    .ticket-termico { width:280px; background:white; color:black; padding:20px; font-family:monospace; font-size:12px; }
    
    #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style> 
</head> 
<body> 

  <div id="ticket-wrapper"><div id="ticket-visual" class="ticket-termico"><div id="ticket-contenido"></div></div></div>
  
  <div id="bloqueo">
    <h2 style="color:white">SISTEMA PROTEGIDO</h2>
    <input type="password" id="passInput" placeholder="Clave de acceso" style="text-align:center"><br>
    <button onclick="validarLicencia()" style="background:var(--success)">Activar Sistema</button>
  </div>

  <div id="contenido-app" style="display:none">
    <header><b>🛠️ LA BODEGUITA PRO</b></header> 
    <div id="alerta-backup" class="alerta-backup" onclick="exportarDatos()">⚠️ CLICK AQUÍ PARA RESPALDO DE SEGURIDAD (BACKUP)</div>
    
    <div class="menu-superior">
      <button onclick="verInventario()">📦 Stock</button>
      <button onclick="verClientes()">👥 Clientes</button>
      <button onclick="verCategorias()">🏷️ Cats</button>
      <button onclick="nuevaVenta()" style="background:var(--success); grid-column: span 2;">➕ Vender/Cotizar</button>
      <button onclick="verConfig()" style="background:#7f8c8d">📊 Reporte</button>
    </div>

    <div id="app"></div> 
  </div>

  <script> 
    const CLAVE_MAESTRA = "BODEGUITA2024";
    const DIAS_LICENCIA = 30;

    let productos = JSON.parse(localStorage.getItem("lb_prods") || "[]");
    let clientes = JSON.parse(localStorage.getItem("lb_clientes") || "[]");
    let categorias = JSON.parse(localStorage.getItem("lb_cats") || '["General"]');
    let historialVentas = JSON.parse(localStorage.getItem("lb_historial") || "[]");
    let ultimoBackup = localStorage.getItem("lb_last_backup") || Date.now();
    let carrito = [];
    let cliSel = null;

    function guardar() {
      localStorage.setItem("lb_prods", JSON.stringify(productos));
      localStorage.setItem("lb_clientes", JSON.stringify(clientes));
      localStorage.setItem("lb_cats", JSON.stringify(categorias));
      localStorage.setItem("lb_historial", JSON.stringify(historialVentas));
      verificarAlertaBackup();
    }

    function validarLicencia() {
      if(document.getElementById("passInput").value === CLAVE_MAESTRA) {
        let fechaVencimiento = new Date().getTime() + (DIAS_LICENCIA * 24 * 60 * 60 * 1000);
        localStorage.setItem("lb_licencia_activa", "true");
        localStorage.setItem("lb_fecha_vencimiento", fechaVencimiento);
        localStorage.removeItem("lb_ultimo_recordatorio");
        chequearAcceso();
      } else { alert("Clave incorrecta"); }
    }

    function chequearAcceso() {
      let activa = localStorage.getItem("lb_licencia_activa");
      let vencimiento = parseInt(localStorage.getItem("lb_fecha_vencimiento"));
      let hoy = new Date().getTime();

      if(activa === "true" && vencimiento && hoy < vencimiento) {
        document.getElementById("bloqueo").style.display = "none";
        document.getElementById("contenido-app").style.display = "block";
        verificarAlertaBackup();
        verInventario();
      } else {
        document.getElementById("bloqueo").style.display = "flex";
      }
    }

    function verificarAlertaBackup() {
      const sieteDias = 7 * 24 * 60 * 60 * 1000;
      const alerta = document.getElementById("alerta-backup");
      if(alerta) alerta.style.display = (Date.now() - ultimoBackup > sieteDias) ? "block" : "none";
    }

    // --- RESPALDO (BACKUP) ---
    function exportarDatos() { 
        const data = { productos, clientes, categorias, historialVentas, fecha: new Date().toLocaleDateString() };
        const blob = new Blob([JSON.stringify(data)], {type:"application/json"}); 
        const a = document.createElement("a"); 
        a.href = URL.createObjectURL(blob); 
        a.download = `BODEGUITA_BACKUP_${new Date().toISOString().slice(0,10)}.json`; 
        a.click(); 
        ultimoBackup = Date.now(); 
        localStorage.setItem("lb_last_backup", ultimoBackup);
        verificarAlertaBackup();
        alert("Backup descargado con éxito. Guárdalo en un lugar seguro.");
    }

    function importarDatos(e) { 
        const reader = new FileReader(); 
        reader.onload = (ev) => { 
            try {
                const d = JSON.parse(ev.target.result); 
                productos = d.productos || []; 
                clientes = d.clientes || []; 
                categorias = d.categorias || ["General"]; 
                historialVentas = d.historialVentas || []; 
                guardar(); 
                alert("Datos restaurados correctamente.");
                location.reload(); 
            } catch(err) { alert("Error al leer el archivo."); }
        }; 
        reader.readAsText(e.target.files[0]); 
    }

    // --- MÓDULO CATEGORÍAS ---
    function verCategorias() {
      let html = "<h3>🏷️ Categorías</h3><input type='text' id='nueva-cat' placeholder='Nueva categoría'><button onclick='agregarCat()' style='width:100%'>+ Añadir</button><br><br>";
      categorias.forEach((c, i) => {
        html += `<div class='lista item-pedido'><span>${c}</span> <button onclick='categorias.splice(${i},1);guardar();verCategorias()' style='background:var(--danger)'>🗑️</button></div>`;
      });
      document.getElementById("app").innerHTML = html;
    }
    function agregarCat() { let n = document.getElementById("nueva-cat").value; if(n){categorias.push(n); guardar(); verCategorias();} }

    // --- MÓDULO CLIENTES ---
    function verClientes() {
      let html = `<h3>👥 Clientes</h3><input type="text" placeholder="🔍 Buscar cliente..." onkeyup="filtrarClientes(this.value)"><button onclick='agregarCliente()' style='width:100%'>+ Nuevo Cliente</button>`;
      clientes.forEach((c, i) => {
        html += `<div class='lista cliente-card' data-nombre='${c.nombre}'>
          <b>${c.nombre}</b><br>📞 ${c.tel}<br>
          <button onclick='editarCliente(${i})' style='background:var(--blue)'>✏️</button>
          <button onclick='clientes.splice(${i},1);guardar();verClientes()' style='background:var(--danger)'>🗑️</button>
        </div>`;
      });
      document.getElementById("app").innerHTML = html;
    }
    function filtrarClientes(v) { document.querySelectorAll(".cliente-card").forEach(c => c.style.display = c.getAttribute("data-nombre").toLowerCase().includes(v.toLowerCase()) ? "block" : "none"); }
    function agregarCliente() { let n = prompt("Nombre:"); let t = prompt("Tel:"); let d = prompt("Dir:"); if(n){clientes.push({nombre:n, tel:t, dir:d}); guardar(); verClientes();} }
    
    // --- MÓDULO INVENTARIO ---
    function verInventario() {
      let html = "<h3>📦 Inventario</h3>";
      html += `<div class="excel-tools">
                <button onclick="exportarExcel()" style="background:#27ae60">📗 Exp. Excel</button>
                <button onclick="document.getElementById('in-ex').click()" style="background:#2980b9">📘 Imp. Excel</button>
                <input type="file" id="in-ex" style="display:none" onchange="importarExcel(event)">
              </div>`;
      html += "<button onclick='abrirFormProducto()' style='width:100%'>+ Nuevo Producto</button><div class='grid'>";
      productos.forEach((p, i) => {
        let esBajo = p.stock <= (p.minimo || 10);
        html += `<div class='card ${esBajo ? 'stock-bajo' : ''}'>
          ${esBajo ? '<span class="aviso-reponer">⚠️ BAJO STOCK</span>' : ''}
          <b>${p.nombre}</b><br>
          <b>Venta: $${p.precio.toLocaleString()}</b><br>
          <span class='badge'>${p.cat}</span><br>
          <span style="font-size:0.8em; color:#666">Stock: ${p.stock}</span><br>
          <button onclick='abrirFormProducto(${i})' style='background:var(--blue); margin-top:5px'>✏️</button>
          <button onclick='if(confirm("¿Eliminar?")){productos.splice(${i},1);guardar();verInventario()}' style='background:var(--danger); margin-top:5px'>🗑️</button>
        </div>`;
      });
      document.getElementById("app").innerHTML = html + "</div>";
    }

    function abrirFormProducto(idx = -1) {
      let p = idx !== -1 ? productos[idx] : {nombre:"", coste:0, precio:"", cat:"General", stock:0, minimo:10};
      let cats = categorias.map(c => `<option value="${c}" ${p.cat===c?'selected':''}>${c}</option>`).join("");
      document.getElementById("app").innerHTML = `<h3>${idx!==-1?'Editar':'Nuevo'} Producto</h3>
        <input id='p-n' placeholder='Nombre' value='${p.nombre}'>
        <input id='p-coste' type='number' placeholder='Costo' value='${p.coste || 0}'>
        <input id='p-p' type='number' placeholder='Precio Venta' value='${p.precio}'>
        <select id='p-c'>${cats}</select>
        <input id='p-s' type='number' placeholder='Stock' value='${p.stock}'>
        <input id='p-m' type='number' placeholder='Alerta Stock Bajo en:' value='${p.minimo}'>
        <button onclick='saveP(${idx})' style='width:100%; background:var(--success)'>💾 Guardar</button>
        <button onclick='verInventario()' style='width:100%; background:#7f8c8d; margin-top:10px'>Volver</button>`;
    }
    function saveP(idx) {
        let obj = { 
            nombre: document.getElementById('p-n').value, 
            coste: parseFloat(document.getElementById('p-coste').value || 0),
            precio: parseFloat(document.getElementById('p-p').value), 
            cat: document.getElementById('p-c').value, 
            stock: parseInt(document.getElementById('p-s').value), 
            minimo: parseInt(document.getElementById('p-m').value) 
        };
        if(idx===-1) productos.push(obj); else productos[idx] = obj;
        guardar(); verInventario();
    }

    // --- MÓDULO VENTA CON BUSCADOR DE CLIENTES ---
    function nuevaVenta() {
      cliSel = null;
      let html = `<div class='lista'>
          <b>👤 SELECCIONAR CLIENTE:</b>
          <input type="text" id="input-busc-cliente" placeholder="🔍 Escribe nombre de cliente..." oninput="ejecutarFiltroCliente()">
          <select id="sel-cliente" onchange="seleccionarClienteDeLista()">
            <option value="">-- Consumidor Final --</option>
          </select>
          <hr>
          <b>📦 AGREGAR PRODUCTOS:</b>
          <input type="text" placeholder="🔍 Buscar producto..." onkeyup="filtrarP(this.value)">
          </div><div class='grid'>`;
      
      productos.forEach((p, i) => {
        html += `<div class='card card-prod' data-nombre='${p.nombre}' onclick='preguntarCantidad(${i})'>
          <b>${p.nombre}</b><br>$${p.precio.toLocaleString()}<br>
          <small>Stock: ${p.stock}</small>
        </div>`;
      });
      document.getElementById("app").innerHTML = html + "</div><div id='lista-carrito'></div>";
      
      // Cargar lista inicial de clientes
      ejecutarFiltroCliente();
      actualizarCarrito();
    }

    function ejecutarFiltroCliente() {
        const busqueda = document.getElementById("input-busc-cliente").value.toLowerCase();
        const select = document.getElementById("sel-cliente");
        
        // Limpiamos opciones
        select.innerHTML = '<option value="">-- Consumidor Final --</option>';
        
        clientes.forEach((c, i) => {
            if (c.nombre.toLowerCase().includes(busqueda)) {
                const opt = document.createElement("option");
                opt.value = i;
                opt.textContent = c.nombre;
                select.appendChild(opt);
            }
        });
    }

    function seleccionarClienteDeLista() {
        const select = document.getElementById("sel-cliente");
        if(select.value === "") {
            cliSel = null;
        } else {
            cliSel = clientes[select.value];
        }
    }

    function filtrarP(v) { document.querySelectorAll(".card-prod").forEach(c => c.style.display = c.getAttribute("data-nombre").toLowerCase().includes(v.toLowerCase()) ? "block" : "none"); }

    function preguntarCantidad(idx) {
        let p = productos[idx];
        if(p.stock <= 0) { alert("¡Sin existencias!"); return; }
        let cant = prompt(`¿Cuántas unidades de ${p.nombre}?`, "1");
        if(!cant || isNaN(cant) || cant <= 0) return;
        cant = parseInt(cant);
        if(cant > p.stock) { alert(`Error: Solo tienes ${p.stock}.`); return; }
        
        carrito.push({ idx: idx, nombre: p.nombre, precioUnidad: p.precio, costeUnidad: p.coste || 0, cantidad: cant, subtotal: p.precio * cant });
        actualizarCarrito();
    }

    function actualizarCarrito() {
      let total = 0;
      let html = "<div class='lista'><b>🛒 Detalle:</b>";
      carrito.forEach((it, i) => {
        total += it.subtotal;
        html += `<div class='item-pedido'>${it.cantidad}x ${it.nombre} <span>$${it.subtotal.toLocaleString()} <button onclick='carrito.splice(${i},1);actualizarCarrito()' style='background:red'>x</button></span></div>`;
      });
      if(carrito.length > 0) {
        html += `<hr><b>TOTAL: $${total.toLocaleString()}</b>
          <button class='btn-venta' onclick='finalizarVenta(${total}, true)'>💰 COBRAR Y DESCONTAR</button>
          <button onclick='finalizarVenta(${total}, false)' style='background:var(--blue); width:95%; display:block; margin:5px auto; padding:12px; color:white; border-radius:8px;'>📄 SOLO COTIZAR</button>`;
      }
      document.getElementById("lista-carrito").innerHTML = html;
    }

    function finalizarVenta(total, esVenta) {
      let utilidadVenta = 0;
      if(esVenta) {
        carrito.forEach(item => { 
            productos[item.idx].stock -= item.cantidad; 
            utilidadVenta += (item.precioUnidad - item.costeUnidad) * item.cantidad;
        });
        historialVentas.push({ fecha: new Date().toLocaleString(), total: total, utilidad: utilidadVenta, cliente: cliSel ? cliSel.nombre : "Final" });
      }
      
      let titulo = esVenta ? "RECIBO" : "COTIZACIÓN";
      document.getElementById("ticket-contenido").innerHTML = `<div style="text-align:center"><h2>LA BODEGUITA</h2><h3>${titulo}</h3></div><p>${cliSel?cliSel.nombre:'C. Final'}<br>${new Date().toLocaleString()}</p><hr>` + carrito.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.cantidad} ${i.nombre}</span><span>$${i.subtotal}</span></div>`).join("") + `<hr><h3 style="text-align:right">TOTAL: $${total}</h3>`;
      
      document.getElementById("ticket-wrapper").style.display = "flex";
      setTimeout(() => {
        html2canvas(document.getElementById("ticket-visual")).then(canvas => {
          let link = document.createElement('a'); link.download = `${titulo}_${Date.now()}.png`; link.href = canvas.toDataURL(); link.click();
          guardar(); carrito = []; document.getElementById("ticket-wrapper").style.display = "none"; nuevaVenta();
        });
      }, 500);
    }

    function verConfig() {
      let tV = 0, tU = 0;
      let html = "<h3>📊 Reporte</h3><div class='lista'>";
      historialVentas.forEach(v => { tV += v.total; tU += (v.utilidad || 0); });
      html += `<h4>TOTAL VENTAS: $${tV.toLocaleString()}</h4><h4 style="color:var(--success)">UTILIDAD: $${tU.toLocaleString()}</h4><hr>
              <button onclick="exportarDatos()" style="background:#2d3436;width:100%">📥 Descargar Backup (JSON)</button>
              <br><br><label>Restaurar Backup:</label><input type="file" onchange="importarDatos(event)">
              <button onclick="if(confirm('¿Borrar?')){historialVentas=[];guardar();verConfig()}" style="background:red;width:100%;margin-top:10px">Limpiar Historial</button></div>`;
      document.getElementById("app").innerHTML = html;
    }

    chequearAcceso();
  </script> 
</body> 
</html>
