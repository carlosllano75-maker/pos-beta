<!DOCTYPE html> 
<html lang="es"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> 
  <title>LA BODEGUITA PRO</title>
  <meta name="theme-color" content="#2c3e50">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style> 
    :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --bg: #f4f7f6; --blue: #3498db; --warning: #f39c12; --danger: #e74c3c; }
    body{font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:#333; margin:0; padding-bottom:60px;} 
    header{background: linear-gradient(135deg, var(--primary) 0%, #000 100%); padding:15px; text-align:center; color:white; border-bottom:4px solid var(--accent); position: sticky; top:0; z-index:1000;} 
    .menu-superior{display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; background:#ecf0f1; padding:10px;}
    .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; padding:10px} 
    .card{background:white; border-radius:10px; padding:12px; text-align:center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative;} 
    .stock-bajo { border: 2px solid var(--danger) !important; background: #fff5f5; }
    .aviso-reponer { color: var(--danger); font-size: 10px; font-weight: bold; display: block; margin-bottom: 5px; }
    button{padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:bold; cursor:pointer;} 
    .lista{background:white; padding:15px; border-radius:12px; margin:10px; border:1px solid #ddd;} 
    input, select{padding:12px; border-radius:8px; border:1px solid #ccc; width:92%; margin:8px auto; display:block; font-size:16px;}
    .badge{background:var(--primary); color:white; padding:3px 8px; border-radius:5px; font-size:0.75em;}
    .excel-tools { background: #e8f4fd; padding: 10px; border-radius: 10px; margin: 10px; display: flex; gap: 5px; justify-content: center; border: 1px solid #3498db; }
    #ticket-wrapper { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; }
    .ticket-termico { width:280px; background:white; padding:20px; font-family:monospace; font-size:12px; }
  </style> 
</head> 
<body> 

  <div id="ticket-wrapper"><div id="ticket-visual" class="ticket-termico"><div id="ticket-contenido"></div></div></div>
  <header><b>🛠️ LA BODEGUITA PRO</b></header> 
  
  <div class="menu-superior">
    <button onclick="verInventario()">📦 Stock</button>
    <button onclick="verClientes()">👥 Clientes</button>
    <button onclick="verCategorias()">🏷️ Cats</button>
    <button onclick="nuevaVenta()" style="background:var(--success); grid-column: span 2;">➕ Vender/Cotizar</button>
    <button onclick="verConfig()" style="background:#7f8c8d">📊 Reporte</button>
  </div>

  <div id="app"></div> 

  <script> 
    let productos = JSON.parse(localStorage.getItem("lb_prods") || "[]");
    let clientes = JSON.parse(localStorage.getItem("lb_clientes") || "[]");
    let categorias = JSON.parse(localStorage.getItem("lb_cats") || '["General"]');
    let historialVentas = JSON.parse(localStorage.getItem("lb_historial") || "[]");
    let carrito = [];

    function guardar() {
      localStorage.setItem("lb_prods", JSON.stringify(productos));
      localStorage.setItem("lb_clientes", JSON.stringify(clientes));
      localStorage.setItem("lb_cats", JSON.stringify(categorias));
      localStorage.setItem("lb_historial", JSON.stringify(historialVentas));
    }

    // --- EXCEL ---
    function importarExcel(e) {
      const reader = new FileReader();
      reader.onload = (evt) => {
        const data = evt.target.result;
        const workbook = XLSX.read(data, { type: 'binary' });
        const excelData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        if(confirm("Se borrará el inventario actual. ¿Continuar?")) {
          productos = excelData.map(row => ({
            nombre: row.NOMBRE || row.Nombre || "Sin nombre",
            coste: parseFloat(row.COSTE || row.Coste || 0),
            precio: parseFloat(row.PRECIO || row.Precio || row.PEECIO || 0),
            cat: row.CATEGORIA || "General",
            stock: parseInt(row.STOCK || 0),
            minimo: parseInt(row.MINIMO || 10)
          }));
          guardar(); verInventario();
        }
      };
      reader.readAsBinaryString(e.target.files[0]);
    }

    // --- INVENTARIO ---
    function verInventario() {
      let html = `<div class="excel-tools">
        <button onclick="document.getElementById('in-ex').click()" style="background:#2980b9">📘 Importar Excel</button>
        <input type="file" id="in-ex" style="display:none" onchange="importarExcel(event)">
      </div>
      <button onclick="abrirFormProducto()" style="width:95%; display:block; margin:10px auto">+ Nuevo Producto</button>
      <div class="grid">`;
      
      productos.forEach((p, i) => {
        let esBajo = p.stock <= (p.minimo || 10);
        html += `<div class="card ${esBajo ? 'stock-bajo' : ''}">
          ${esBajo ? '<span class="aviso-reponer">⚠️ STOCK BAJO</span>' : ''}
          <b>${p.nombre}</b><br>
          <small>Costo: $${(p.coste||0).toLocaleString()}</small><br>
          <b style="color:var(--success)">Venta: $${(p.precio||0).toLocaleString()}</b><br>
          <span class="badge">${p.cat}</span><br>
          <small>Stock: ${p.stock}</small><br>
          <button onclick="abrirFormProducto(${i})" style="background:var(--blue); margin-top:5px">✏️</button>
          <button onclick="productos.splice(${i},1);guardar();verInventario()" style="background:var(--danger)">🗑️</button>
        </div>`;
      });
      document.getElementById("app").innerHTML = html + "</div>";
    }

    function abrirFormProducto(idx = -1) {
      let p = idx !== -1 ? productos[idx] : {nombre:"", coste:0, precio:0, cat:"General", stock:0, minimo:10};
      document.getElementById("app").innerHTML = `<div class="lista">
        <h3>${idx!==-1?'Editar':'Nuevo'} Producto</h3>
        <input id="p-n" placeholder="Nombre" value="${p.nombre}">
        <input id="p-co" type="number" placeholder="Costo" value="${p.coste}">
        <input id="p-pr" type="number" placeholder="Precio Venta" value="${p.precio}">
        <input id="p-s" type="number" placeholder="Stock" value="${p.stock}">
        <button onclick="saveP(${idx})" style="width:100%; background:var(--success)">💾 Guardar</button>
        <button onclick="verInventario()" style="width:100%; background:#7f8c8d; margin-top:5px">Volver</button>
      </div>`;
    }

    function saveP(idx) {
      let obj = { 
        nombre: document.getElementById("p-n").value, 
        coste: parseFloat(document.getElementById("p-co").value), 
        precio: parseFloat(document.getElementById("p-pr").value), 
        cat: "General", 
        stock: parseInt(document.getElementById("p-s").value), 
        minimo: 10 
      };
      if(idx === -1) productos.push(obj); else productos[idx] = obj;
      guardar(); verInventario();
    }

    // --- VENTAS ---
    function nuevaVenta() {
      let html = `<div class="lista"><input type="text" placeholder="🔍 Buscar..." onkeyup="filtrarV(this.value)"></div><div class="grid">`;
      productos.forEach((p, i) => {
        html += `<div class="card card-v" data-n="${p.nombre}" onclick="addCart(${i})">
          <b>${p.nombre}</b><br>$${p.precio.toLocaleString()}<br><small>Stock: ${p.stock}</small>
        </div>`;
      });
      document.getElementById("app").innerHTML = html + "</div><div id='cart'></div>";
    }

    function filtrarV(v) { document.querySelectorAll(".card-v").forEach(c => c.style.display = c.getAttribute("data-n").toLowerCase().includes(v.toLowerCase()) ? "block" : "none"); }

    function addCart(idx) {
      let cant = prompt("¿Cantidad?", "1");
      if(cant > 0) {
        let p = productos[idx];
        carrito.push({ nombre: p.nombre, precio: p.precio, coste: p.coste, cant: parseInt(cant), total: p.precio * cant, idx: idx });
        renderCart();
      }
    }

    function renderCart() {
      let t = 0;
      let html = `<div class="lista"><b>🛒 Carrito:</b>`;
      carrito.forEach((item, i) => {
        t += item.total;
        html += `<div style="display:flex; justify-content:space-between; font-size:13px; margin:5px 0;">
          <span>${item.cant}x ${item.nombre}</span>
          <span>$${item.total.toLocaleString()} <button onclick="carrito.splice(${i},1);renderCart()" style="background:red; padding:2px 5px">x</button></span>
        </div>`;
      });
      if(carrito.length > 0) {
        html += `<hr><b>TOTAL: $${t.toLocaleString()}</b>
        <button onclick="cobrar(${t})" style="width:100%; background:var(--success); margin-top:10px; padding:15px">💰 COBRAR</button></div>`;
      }
      document.getElementById("cart").innerHTML = html;
    }

    function cobrar(t) {
      let utilidad = 0;
      carrito.forEach(i => {
        productos[i.idx].stock -= i.cant;
        utilidad += (i.precio - i.coste) * i.cant;
      });
      historialVentas.push({ fecha: new Date().toLocaleString(), total: t, utilidad: utilidad });
      guardar(); carrito = []; alert("Venta Exitosa"); nuevaVenta();
    }

    function verConfig() {
      let v = 0, u = 0;
      historialVentas.forEach(h => { v += h.total; u += h.utilidad; });
      document.getElementById("app").innerHTML = `<div class="lista">
        <h3>📊 Reporte</h3>
        <p>Ventas Totales: <b>$${v.toLocaleString()}</b></p>
        <p style="color:var(--success)">Utilidad Real: <b>$${u.toLocaleString()}</b></p>
        <button onclick="historialVentas=[];guardar();verConfig()" style="background:var(--danger); width:100%">Limpiar Historial</button>
      </div>`;
    }

    function verClientes() { document.getElementById("app").innerHTML = "<div class='lista'>Módulo Clientes (Próximamente)</div>"; }
    function verCategorias() { document.getElementById("app").innerHTML = "<div class='lista'>Módulo Categorías (Próximamente)</div>"; }

    verInventario();
  </script> 
</body> 
</html>
