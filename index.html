  <style> 
    :root { --primary: #1a252f; --accent: #e67e22; --success: #27ae60; --bg: #f4f7f6; --blue: #3498db; --warning: #f39c12; --danger: #e74c3c; }
    body{font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:#333; margin:0; padding-bottom:60px;} 
    header{background: linear-gradient(135deg, var(--primary) 0%, #000 100%); padding:15px; text-align:center; color:white; border-bottom:4px solid var(--accent); position: sticky; top:0; z-index:1000;} 
    
    .logo-bloqueo {
        width: 220px;
        height: auto;
        margin-bottom: 20px;
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    .menu-superior{display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; background:#ecf0f1; padding:10px;}
    .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; padding:10px} 
    .card{background:white; border-radius:10px; padding:12px; text-align:center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee;} 
    button{padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:bold; cursor:pointer;} 
    .btn-venta{background:var(--success); width:95%; margin:10px auto; display:block; font-size:1.1em; padding:15px;}
    .lista{background:white; padding:15px; border-radius:12px; margin:10px; border:1px solid #ddd;} 
    input, select{padding:12px; border-radius:8px; border:1px solid #ccc; width:92%; margin:8px auto; display:block; font-size:16px;}
    
    #ticket-wrapper { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:2000; overflow-y:auto;}
    .ticket-termico { 
        width: 56mm; 
        background:white; 
        color:black; 
        padding: 10px 2mm; 
        font-family: 'Courier New', monospace; 
        font-size: 24px; 
        font-weight: 900; 
        line-height: 1.1; 
    }
    .ticket-termico b { font-size: 28px; }

    #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    @media print {
      body { margin: 0; }
      #contenido-app, header, .menu-superior { display: none !important; }
      #ticket-wrapper { position: absolute; top:0; left:0; background: white; display: block; width: 100%; }
      .ticket-termico { width: 100%; border: none; }
    }
  </style> 
</head> 
<body> 

  <div id="bloqueo">
    <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAEAAQADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZnaGqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD3+iiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigD//Z" class="logo-bloqueo">
    <h2 style="color:white; margin-bottom:20px;">SISTEMA PROTEGIDO</h2>
    <input type="password" id="passInput" placeholder="Contraseña" style="text-align:center">
    <button onclick="validarLicencia()" style="background:var(--success); width:220px; padding:15px; margin-top:10px;">ENTRAR</button>
  </div>

  <div id="ticket-wrapper">
    <div id="ticket-visual" class="ticket-termico"><div id="ticket-contenido"></div></div>
    <div class="no-print" style="margin-top:20px; display:flex; gap:10px;">
        <button onclick="imprimirTicket()" style="background:var(--success); padding:15px;">🖨️ IMPRIMIR</button>
        <button onclick="cerrarTicket()" style="background:var(--danger); padding:15px;">❌ CERRAR</button>
    </div>
  </div>

  <div id="contenido-app" style="display:none">
    <header><b>🛠️ LA BODEGUITA PRO</b></header> 
    <div class="menu-superior">
      <button onclick="verInventario()">📦 Stock</button>
      <button onclick="verClientes()">👥 Clientes</button>
      <button onclick="verConfig()">📊 Reporte</button>
      <button onclick="nuevaVenta()" style="background:var(--success); grid-column: span 3; margin-top:5px;">➕ Vender/Cotizar</button>
    </div>
    <div id="app"></div> 
  </div>

  <script> 
    const CLAVE_MAESTRA = "BODEGUITA2024";
    const LOGO_BASE64 = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAEAAQADASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZnaGqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/9oADAMBAAIRAxEAPwD3+iiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigD//Z";

    let productos = JSON.parse(localStorage.getItem("lb_prods") || "[]");
    let historialVentas = JSON.parse(localStorage.getItem("lb_historial") || "[]");
    let carrito = [];

    function validarLicencia() {
      if(document.getElementById("passInput").value === CLAVE_MAESTRA) {
        localStorage.setItem("lb_licencia_activa", "true");
        chequearAcceso();
      } else alert("Clave incorrecta");
    }

    function chequearAcceso() {
      if(localStorage.getItem("lb_licencia_activa") === "true") {
        document.getElementById("bloqueo").style.display = "none";
        document.getElementById("contenido-app").style.display = "block";
        verInventario();
      }
    }

    function verInventario() {
      let html = "<h3>📦 Inventario</h3><button onclick='abrirFormProducto()' style='width:100%'>+ Nuevo Producto</button><div class='grid'>";
      productos.forEach((p, i) => {
        html += `<div class='card'><b>${p.nombre}</b><br><b>$${p.precio.toLocaleString()}</b><br><small>Stock: ${p.stock}</small><br><button onclick='abrirFormProducto(${i})' style='background:var(--blue)'>✏️</button></div>`;
      });
      document.getElementById("app").innerHTML = html + "</div>";
    }

    function abrirFormProducto(idx = -1) {
      let p = idx !== -1 ? productos[idx] : {nombre:"", precio:"", stock:0};
      document.getElementById("app").innerHTML = `<h3>${idx!==-1?'Editar':'Nuevo'}</h3><input id='p-n' placeholder='Nombre' value='${p.nombre}'><input id='p-p' type='number' placeholder='Precio' value='${p.precio}'><input id='p-s' type='number' placeholder='Stock' value='${p.stock}'><button onclick='saveP(${idx})' style='width:100%; background:var(--success)'>💾 Guardar</button>`;
    }
    
    function saveP(idx) { 
      let obj = { nombre: document.getElementById('p-n').value, precio: parseFloat(document.getElementById('p-p').value), stock: parseInt(document.getElementById('p-s').value) }; 
      if(idx===-1) productos.push(obj); else productos[idx] = obj; 
      localStorage.setItem("lb_prods", JSON.stringify(productos));
      verInventario(); 
    }

    function nuevaVenta() {
      carrito = [];
      let html = `<div class='lista'><b>🔍 BUSCAR PRODUCTO:</b><input type="text" placeholder="Escribe nombre..." onkeyup="filtrarP(this.value)"></div><div class='grid'>`;
      productos.forEach((p, i) => { html += `<div class='card card-prod' data-nombre='${p.nombre}' onclick='preguntarCantidad(${i})'><b>${p.nombre}</b><br>$${p.precio.toLocaleString()}</div>`; });
      document.getElementById("app").innerHTML = html + "</div><div id='lista-carrito'></div>";
    }

    function filtrarP(v) { document.querySelectorAll(".card-prod").forEach(c => c.style.display = c.getAttribute("data-nombre").toLowerCase().includes(v.toLowerCase()) ? "block" : "none"); }

    function preguntarCantidad(idx) {
        let p = productos[idx];
        let cant = prompt(`Cantidad de ${p.nombre}:`, "1");
        if(!cant || isNaN(cant) || cant <= 0) return;
        carrito.push({ idx: idx, nombre: p.nombre, precioUnidad: p.precio, cantidad: parseInt(cant), subtotal: p.precio * parseInt(cant) });
        actualizarCarrito();
    }

    function actualizarCarrito() {
      let total = 0; let html = "<div class='lista'><b>🛒 Detalle:</b>";
      carrito.forEach((it, i) => { total += it.subtotal; html += `<div style='display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:5px;'><span>${it.cantidad}x ${it.nombre}</span><span>$${it.subtotal.toLocaleString()}</span></div>`; });
      if(carrito.length > 0) html += `<hr><b style="font-size:22px;">TOTAL: $${total.toLocaleString()}</b><button class='btn-venta' onclick='finalizarVenta(${total})'>🖨️ GENERAR RECIBO</button>`;
      document.getElementById("lista-carrito").innerHTML = html;
    }

    function finalizarVenta(total) {
      carrito.forEach(item => { productos[item.idx].stock -= item.cantidad; });
      localStorage.setItem("lb_prods", JSON.stringify(productos));
      
      document.getElementById("ticket-contenido").innerHTML = `
        <div style="text-align:center;">
          <img src="${LOGO_BASE64}" style="width:140px; margin-bottom:5px;"><br>
          <b style="font-size:26px;">LA BODEGUITA</b><br>
          <span>RECIBO DE VENTA</span><hr>
        </div>
        <div style="font-size:18px;">
          FECHA: ${new Date().toLocaleDateString()}<br>
          HORA: ${new Date().toLocaleTimeString()}
        </div>
        <div style="margin-top:10px; border-top:2px solid #000; padding-top:5px;">
          ${carrito.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.cantidad} ${i.nombre.toUpperCase()}</span><span>$${i.subtotal.toLocaleString()}</span></div>`).join("")}
        </div>
        <div style="text-align:right; margin-top:10px; border-top:2px solid #000; padding-top:5px;">
          <b style="font-size:32px;">TOTAL: $${total.toLocaleString()}</b>
        </div>
        <div style="text-align:center; margin-top:20px; font-size:16px; border-top:1px dashed #000; padding-top:10px;">¡GRACIAS POR SU COMPRA!</div>`;
      
      document.getElementById("ticket-wrapper").style.display = "flex";
    }

    function imprimirTicket() { window.print(); }
    function cerrarTicket() { document.getElementById('ticket-wrapper').style.display = 'none'; nuevaVenta(); }
    function verConfig() { alert("Reportes guardados localmente."); }
    function verClientes() { alert("Modulo clientes."); }

    chequearAcceso();
  </script> 
</body> 
</html>
