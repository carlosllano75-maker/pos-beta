<!DOCTYPE html> 
<html lang="es"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> 
  <title>LA BODEGUITA - Sistema Pro</title>
  
  <meta name="theme-color" content="#2c3e50">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style> 
    :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --bg: #f4f7f6; --blue: #3498db; }
    body{font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:#333; margin:0; padding-bottom:50px;} 
    header{background: linear-gradient(135deg, var(--primary) 0%, #000 100%); padding:15px; text-align:center; color:white; border-bottom:4px solid var(--accent);} 
    .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; padding:10px} 
    .card{background:white; border-radius:10px; padding:12px; text-align:center; border:none; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05);} 
    button{padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:bold; cursor:pointer; margin: 2px;} 
    .btn-venta{background:var(--success); width:95%; margin:10px auto; display:block; font-size:1.1em; padding:15px;}
    .btn-cotizar{background:var(--blue); width:95%; margin:5px auto; display:block; padding:12px; font-weight:bold; color:white; border-radius:8px;}
    .lista{background:white; padding:15px; border-radius:12px; margin:15px; border:1px solid #ddd; box-shadow: 0 -4px 15px rgba(0,0,0,0.05)} 
    .item-pedido{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; border-bottom:1px solid #eee; padding:5px 0}
    input, select{padding:12px; border-radius:8px; border:1px solid #ccc; width:92%; margin:8px auto; display:block; font-size:16px;}
    #app{padding:10px;}
    .badge{background:var(--primary); color:white; padding:3px 8px; border-radius:5px; font-size:0.75em;}
    
    /* Ticket */
    #ticket-wrapper { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:1000;}
    .ticket-termico { width:280px; background:white; color:black; padding:20px; font-family:monospace; font-size:12px; }
    .buscador-container { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 5px 0; border-bottom: 1px solid #ddd; }
  </style> 
</head> 
<body> 

  <div id="ticket-wrapper">
    <div id="ticket-visual" class="ticket-termico">
      <div style="text-align:center">
        <h2 style="margin:0">LA BODEGUITA</h2>
        <p style="font-size:10px" id="t-tipo-doc"></p>
        <p style="font-size:10px; text-align:left" id="t-cliente-info"></p>
        <p style="font-size:9px" id="t-fecha"></p>
      </div>
      <hr>
      <div id="t-items"></div>
      <div id="t-detalles" style="text-align:right; margin-top:10px"></div>
      <hr>
      <h2 id="t-total" style="text-align:right"></h2>
      <p style="text-align:center; margin-top:15px">¡Gracias por preferirnos!</p>
    </div>
  </div>

  <header> 
    <b>🛠️ LA BODEGUITA (BETA)</b> 
  </header> 
  
  <div style="text-align:center; background:#ecf0f1; padding:10px; display:flex; flex-wrap:wrap; justify-content:center;">
    <button onclick="verInventario()">📦 Productos</button>
    <button onclick="verClientes()">👥 Clientes</button>
    <button onclick="nuevaVenta()" style="background:var(--success)">➕ Vender/Cotizar</button>
    <button onclick="verConfig()" style="background:#7f8c8d">⚙️ Ajustes</button>
  </div>

  <div id="app"></div> 

  <script> 
    let productos = JSON.parse(localStorage.getItem("lb_prods") || "[]");
    let clientes = JSON.parse(localStorage.getItem("lb_clientes") || "[]");
    let carrito = [];
    let ventasTotales = parseFloat(localStorage.getItem("lb_ventas") || "0");
    window.descuentoActivo = 0;
    let clienteSeleccionado = null;

    function guardar() {
      localStorage.setItem("lb_prods", JSON.stringify(productos));
      localStorage.setItem("lb_clientes", JSON.stringify(clientes));
      localStorage.setItem("lb_ventas", ventasTotales.toString());
    }

    // --- MÓDULO PRODUCTOS ---
    function verInventario() {
      let html = "<h3>Inventario</h3><button onclick='agregarProducto()' style='width:100%'>+ Nuevo Producto</button><div class='grid'>";
      productos.forEach((p, i) => {
        html += `<div class='card'><b>${p.nombre}</b><br><span class='badge'>${p.cat}</span><br><b>$${p.precio.toLocaleString()}</b><br><button onclick='eliminarProd(${i})' style='background:red'>🗑️</button></div>`;
      });
      document.getElementById("app").innerHTML = html + "</div>";
    }

    function agregarProducto() {
      let n = prompt("Nombre:"); let pr = prompt("Precio:"); let c = prompt("Categoría:");
      if(n && pr) { productos.push({nombre: n, precio: parseFloat(pr), cat: c}); guardar(); verInventario(); }
    }

    function eliminarProd(i) { if(confirm("¿Eliminar?")) { productos.splice(i, 1); guardar(); verInventario(); } }

    // --- MÓDULO CLIENTES ---
    function verClientes() {
      let html = "<h3>Gestión de Clientes</h3><button onclick='agregarCliente()' style='width:100%'>+ Agregar Nuevo Cliente</button><br><br>";
      clientes.forEach((c, i) => {
        html += `<div class='lista'>
          <b>${c.nombre}</b><br>
          📍 ${c.dir} | 📞 ${c.tel}<br>
          <button onclick='editarCliente(${i})' style='background:var(--blue)'>✏️ Editar</button>
          <button onclick='eliminarCliente(${i})' style='background:red'>🗑️</button>
        </div>`;
      });
      document.getElementById("app").innerHTML = html;
    }

    function agregarCliente() {
      let n = prompt("Nombre completo:");
      let t = prompt("Teléfono:");
      let d = prompt("Dirección:");
      if(n) { clientes.push({nombre: n, tel: t, dir: d}); guardar(); verClientes(); }
    }

    function editarCliente(i) {
      clientes[i].nombre = prompt("Nombre:", clientes[i].nombre);
      clientes[i].tel = prompt("Teléfono:", clientes[i].tel);
      clientes[i].dir = prompt("Dirección:", clientes[i].dir);
      guardar(); verClientes();
    }

    function eliminarCliente(i) { if(confirm("¿Eliminar cliente?")) { clientes.splice(i, 1); guardar(); verClientes(); } }

    // --- MÓDULO VENTA ---
    function nuevaVenta() {
      let html = `<div class="buscador-container">
          <input type="text" id="buscar-prod" placeholder="🔍 Buscar..." onkeyup="filtrarProductos()">
          <select id="select-cliente" onchange="clienteSeleccionado = clientes[this.value]">
            <option value="">👤 Seleccionar Cliente (Opcional)</option>`;
      clientes.forEach((c, i) => { html += `<option value="${i}">${c.nombre}</option>`; });
      html += `</select></div><div class='grid'>`;
      
      productos.forEach(p => {
        html += `<div class='card card-prod' data-nombre="${p.nombre}" onclick='alCarrito("${p.nombre}", ${p.precio})'>
            <b>${p.nombre}</b><br>$${p.precio.toLocaleString()}</div>`;
      });
      document.getElementById("app").innerHTML = html + "</div><div class='lista' id='lista-carrito'></div>";
      actualizarCarrito();
    }

    function alCarrito(n, pr) { carrito.push({nombre: n, precio: pr}); actualizarCarrito(); }
    function quitar(i) { carrito.splice(i, 1); actualizarCarrito(); }

    function actualizarCarrito() {
      let sub = 0; carrito.forEach(item => sub += item.precio);
      let desc = (sub * window.descuentoActivo) / 100;
      let total = sub - desc;

      let html = "<b>Carrito:</b><br>";
      carrito.forEach((item, i) => {
        html += `<div class='item-pedido'><span>${item.nombre}</span><span>$${item.precio.toLocaleString()} <button onclick='quitar(${i})' style='background:red; padding:2px 5px'>x</button></span></div>`;
      });

      html += `<div style="text-align:right; border-top:1px dashed #ccc; padding-top:10px">
        Subtotal: $${sub.toLocaleString()}<br>
        <button onclick="aplicarDescuento()" style="background:#34495e; padding:5px; font-size:0.8em">🏷️ Descuento (${window.descuentoActivo}%)</button><br>
        <h3 style="color:var(--primary)">TOTAL: $${total.toLocaleString()}</h3></div>`;

      if(carrito.length > 0) {
        html += `<button class='btn-venta' onclick='procesar(true, ${sub}, ${desc}, ${total})'>💰 FINALIZAR VENTA</button>`;
        html += `<button class='btn-cotizar' onclick='procesar(false, ${sub}, ${desc}, ${total})'>📄 GENERAR COTIZACIÓN</button>`;
      }
      document.getElementById("lista-carrito").innerHTML = html;
    }

    function aplicarDescuento() {
      let d = prompt("Porcentaje (0-100):", window.descuentoActivo);
      if (d !== null) { window.descuentoActivo = parseFloat(d); actualizarCarrito(); }
    }

    function filtrarProductos() {
      let b = document.getElementById("buscar-prod").value.toLowerCase();
      document.querySelectorAll(".card-prod").forEach(c => {
        c.style.display = c.getAttribute("data-nombre").toLowerCase().includes(b) ? "block" : "none";
      });
    }

    function procesar(esVenta, sub, desc, total) {
      let tipo = esVenta ? "RECIBO DE CAJA" : "COTIZACIÓN";
      document.getElementById("t-tipo-doc").innerText = tipo;
      
      let infoC = "Cliente: Consumidor Final";
      if(clienteSeleccionado) {
        infoC = `Cliente: ${clienteSeleccionado.nombre}<br>Tel: ${clienteSeleccionado.tel}<br>Dir: ${clienteSeleccionado.dir}`;
      }
      document.getElementById("t-cliente-info").innerHTML = infoC;
      document.getElementById("t-fecha").innerText = "Fecha: " + new Date().toLocaleString();
      
      let itemsH = "";
      carrito.forEach(it => { itemsH += `<div style="display:flex; justify-content:space-between"><span>${it.nombre}</span><span>$${it.precio.toLocaleString()}</span></div>`; });
      document.getElementById("t-items").innerHTML = itemsH;
      document.getElementById("t-detalles").innerHTML = desc > 0 ? `Subtotal: $${sub.toLocaleString()}<br>Desc: -$${desc.toLocaleString()}` : "";
      document.getElementById("t-total").innerText = "TOTAL: $" + total.toLocaleString();

      document.getElementById("ticket-wrapper").style.display = "flex";

      setTimeout(() => {
        html2canvas(document.getElementById("ticket-visual")).then(canvas => {
          let link = document.createElement('a');
          link.download = (esVenta ? 'Venta_' : 'Cotiz_') + Date.now() + '.png';
          link.href = canvas.toDataURL();
          link.click();
          if(esVenta) ventasTotales += total;
          carrito = []; clienteSeleccionado = null; window.descuentoActivo = 0; guardar();
          document.getElementById("ticket-wrapper").style.display = "none";
          nuevaVenta();
          alert(esVenta ? "Venta Registrada" : "Cotización Generada");
        });
      }, 500);
    }

    function verConfig() {
      document.getElementById("app").innerHTML = `<h3>Ajustes</h3><div class='card'><h2>Ventas: $${ventasTotales.toLocaleString()}</h2><button onclick='ventasTotales=0;guardar();verConfig();' style='background:red'>Resetear Caja</button></div>`;
    }

    verInventario();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
  </script> 
</body> 
</html>
