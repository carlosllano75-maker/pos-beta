<!DOCTYPE html> 
<html lang="es"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> 
  <title>LA BODEGUITA PRO - Stock Master</title>
  <meta name="theme-color" content="#2c3e50">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style> 
    :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; --bg: #f4f7f6; --blue: #3498db; --warning: #f39c12; --danger: #e74c3c; }
    body{font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:#333; margin:0; padding-bottom:60px;} 
    header{background: linear-gradient(135deg, var(--primary) 0%, #000 100%); padding:15px; text-align:center; color:white; border-bottom:4px solid var(--accent); position: sticky; top:0; z-index:1000;} 
    .alerta-backup { background: var(--warning); color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 14px; display: none; }
    .menu-superior{display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; background:#ecf0f1; padding:10px;}
    .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; padding:10px} 
    .card{background:white; border-radius:10px; padding:12px; text-align:center; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05);} 
    .stock-bajo { border: 2px solid var(--danger) !important; background: #fff5f5; }
    .aviso-reponer { color: var(--danger); font-size: 10px; font-weight: bold; display: block; }
    button{padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:bold; cursor:pointer;} 
    .btn-venta{background:var(--success); width:95%; margin:10px auto; display:block; font-size:1.1em; padding:15px;}
    .lista{background:white; padding:15px; border-radius:12px; margin:10px; border:1px solid #ddd;} 
    .item-pedido{display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; border-bottom:1px solid #eee; padding:5px 0}
    input, select{padding:12px; border-radius:8px; border:1px solid #ccc; width:92%; margin:8px auto; display:block; font-size:16px;}
    .badge{background:var(--primary); color:white; padding:3px 8px; border-radius:5px; font-size:0.75em;}
    .badge-stock { background: #95a5a6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-top: 5px; display: inline-block; }
    #ticket-wrapper { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; overflow-y:auto;}
    .ticket-termico { width:280px; background:white; color:black; padding:20px; font-family:monospace; font-size:12px; }
  </style> 
</head> 
<body> 

  <div id="ticket-wrapper"><div id="ticket-visual" class="ticket-termico"><div id="ticket-contenido"></div></div></div>

  <header><b>🛠️ LA BODEGUITA PRO</b></header> 
  <div id="alerta-backup" class="alerta-backup" onclick="verConfig()">⚠️ REALIZAR BACKUP SEMANAL</div>
  
  <div class="menu-superior">
    <button onclick="verInventario()">📦 Stock</button>
    <button onclick="verClientes()">👥 Clientes</button>
    <button onclick="verCategorias()">🏷️ Cats</button>
    <button onclick="nuevaVenta()" style="background:var(--success); grid-column: span 2;">➕ Vender/Cotizar</button>
    <button onclick="verConfig()" style="background:#7f8c8d">📊 Reporte</button>
  </div>

  <div id="app"></div> 

  <script> 
    let productos = JSON.parse(localStorage.getItem("lb_prods") || "[]");
    let clientes = JSON.parse(localStorage.getItem("lb_clientes") || "[]");
    let categorias = JSON.parse(localStorage.getItem("lb_cats") || '["General"]');
    let historialVentas = JSON.parse(localStorage.getItem("lb_historial") || "[]");
    let ultimoBackup = localStorage.getItem("lb_last_backup") || Date.now();
    let carrito = [];
    let indexEditando = -1;

    function guardar() {
      localStorage.setItem("lb_prods", JSON.stringify(productos));
      localStorage.setItem("lb_clientes", JSON.stringify(clientes));
      localStorage.setItem("lb_cats", JSON.stringify(categorias));
      localStorage.setItem("lb_historial", JSON.stringify(historialVentas));
      verificarAlertaBackup();
    }

    function verificarAlertaBackup() {
      const sieteDias = 7 * 24 * 60 * 60 * 1000;
      document.getElementById("alerta-backup").style.display = (Date.now() - ultimoBackup > sieteDias) ? "block" : "none";
    }

    // --- GESTIÓN DE STOCK Y PRODUCTOS ---
    function verInventario() {
      let html = "<h3>📦 Inventario y Existencias</h3><button onclick='abrirFormProducto()' style='width:100%'>+ Nuevo Producto</button><div class='grid'>";
      productos.forEach((p, i) => {
        let esBajo = p.stock <= (p.minimo || 10);
        html += `<div class='card ${esBajo ? 'stock-bajo' : ''}'>
          ${esBajo ? '<span class="aviso-reponer">⚠️ STOCK BAJO</span>' : ''}
          <b>${p.nombre}</b><br><span class='badge'>${p.cat}</span><br>
          <b>$${p.precio.toLocaleString()}</b><br>
          <span class='badge-stock'>Stock: ${p.stock || 0}</span><br>
          <button onclick='abrirFormProducto(${i})' style='background:var(--blue); margin-top:5px'>✏️</button>
          <button onclick='if(confirm("¿Eliminar?")){productos.splice(${i},1);guardar();verInventario()}' style='background:var(--danger); margin-top:5px'>🗑️</button>
        </div>`;
      });
      document.getElementById("app").innerHTML = html + "</div>";
    }

    function abrirFormProducto(index = -1) {
      indexEditando = index;
      let p = index !== -1 ? productos[index] : {nombre:"", precio:"", cat:"General", stock:0, minimo:10};
      let catHtml = categorias.map(c => `<option value="${c}" ${p.cat === c ? 'selected' : ''}>${c}</option>`).join("");
      
      document.getElementById("app").innerHTML = `<h3>${index!==-1?'Editar':'Nuevo'} Producto</h3>
        <label>Nombre:</label><input id='p-n' value='${p.nombre}'>
        <label>Precio:</label><input id='p-p' type='number' value='${p.precio}'>
        <label>Categoría:</label><select id='p-c'>${catHtml}</select>
        <label>Stock Actual:</label><input id='p-s' type='number' value='${p.stock}'>
        <label>Alerta de Stock Bajo cuando sea menor a:</label><input id='p-m' type='number' value='${p.minimo || 10}'>
        <button onclick='confirmarGuardarProd()' style='width:100%; background:var(--success)'>💾 Guardar Cambios</button>
        <button onclick='verInventario()' style='width:100%; background:#7f8c8d; margin-top:10px'>Cancelar</button>`;
    }

    function confirmarGuardarProd() {
      let n = document.getElementById("p-n").value;
      let p = document.getElementById("p-p").value;
      let s = document.getElementById("p-s").value;
      let m = document.getElementById("p-m").value;
      if(n && p) {
        let nuevoP = {nombre: n, precio: parseFloat(p), cat: document.getElementById("p-c").value, stock: parseInt(s)||0, minimo: parseInt(m)||10};
        if(indexEditando === -1) productos.push(nuevoP); else productos[indexEditando] = nuevoP;
        guardar(); verInventario();
      }
    }

    // --- VENTA CON RESTA DE STOCK ---
    function nuevaVenta() {
      let cSelect = clientes.map((c,i) => `<option value="${i}">${c.nombre}</option>`).join("");
      let html = `<div class='lista'><input type="text" placeholder="🔍 Buscar material..." onkeyup="filtrarP(this.value)">
          <select id="sel-cliente" onchange="window.cliSel = clientes[this.value]"><option value="">👤 Cliente Final</option>${cSelect}</select></div><div class='grid'>`;
      productos.forEach((p, i) => {
        html += `<div class='card card-prod' data-nombre='${p.nombre}' onclick='alCarrito(${i})'>
          <b>${p.nombre}</b><br>$${p.precio.toLocaleString()}<br>
          <small>Disp: ${p.stock}</small>
        </div>`;
      });
      document.getElementById("app").innerHTML = html + "</div><div id='lista-carrito'></div>";
      actualizarCarrito();
    }

    function alCarrito(idx) {
      if(productos[idx].stock <= 0) { alert("¡Sin existencias!"); return; }
      carrito.push({idx: idx, nombre: productos[idx].nombre, precio: productos[idx].precio});
      actualizarCarrito();
    }

    function actualizarCarrito() {
      let total = 0;
      let html = "<div class='lista'><b>🛒 Carrito:</b>";
      carrito.forEach((it, i) => {
        total += it.precio;
        html += `<div class='item-pedido'>${it.nombre} <span>$${it.precio} <button onclick='carrito.splice(${i},1);actualizarCarrito()' style='background:red'>x</button></span></div>`;
      });
      html += `<hr><b>Total: $${total.toLocaleString()}</b>
        <button class='btn-venta' onclick='finalizarVenta(${total})'>💰 REGISTRAR VENTA Y RESTAR STOCK</button></div>`;
      document.getElementById("lista-carrito").innerHTML = html;
    }

    function finalizarVenta(total) {
      if(carrito.length === 0) return;
      // Restar Stock
      carrito.forEach(item => { productos[item.idx].stock -= 1; });
      
      let cli = window.cliSel ? window.cliSel.nombre : "Consumidor Final";
      let fecha = new Date().toLocaleString();
      historialVentas.push({ fecha: fecha, total: total, cliente: cli });
      
      // Ticket Visual
      let itemsH = carrito.map(i => `<div>${i.nombre} .... $${i.precio}</div>`).join("");
      document.getElementById("ticket-contenido").innerHTML = `<h2>LA BODEGUITA</h2><p>VENTA: ${fecha}</p><hr>${itemsH}<hr><h3>TOTAL: $${total}</h3>`;
      document.getElementById("ticket-wrapper").style.display = "flex";

      setTimeout(() => {
        html2canvas(document.getElementById("ticket-visual")).then(canvas => {
          let link = document.createElement('a'); link.download = 'Venta_'+Date.now()+'.png'; link.href = canvas.toDataURL(); link.click();
          guardar(); carrito = []; document.getElementById("ticket-wrapper").style.display = "none"; nuevaVenta();
        });
      }, 500);
    }

    // --- REPORTE Y BACKUP ---
    function verConfig() {
      let totalDia = 0;
      let html = "<h3>📊 Reporte y Backup</h3><div class='lista'>";
      historialVentas.forEach(v => { totalDia += v.total; html += `<div style='font-size:11px;border-bottom:1px solid #eee'>${v.fecha} - ${v.cliente} - $${v.total}</div>`; });
      html += `<h4>TOTAL HOY: $${totalDia.toLocaleString()}</h4><button onclick='exportarDatos()' style='background:#2d3436; width:100%'>📥 Descargar Backup Base Datos</button>
      <br><br><label>Restaurar:</label><input type="file" accept=".json" onchange="importarDatos(event)">
      <br><button onclick='if(confirm("Reiniciar ventas?")){historialVentas=[];guardar();verConfig()}' style='background:red;width:100%'>Limpiar Reporte</button></div>`;
      document.getElementById("app").innerHTML = html;
    }

    function exportarDatos() {
      const blob = new Blob([JSON.stringify({productos, clientes, categorias, historialVentas})], {type:"application/json"});
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `Bodeguita_Backup.json`; a.click();
      ultimoBackup = Date.now(); localStorage.setItem("lb_last_backup", ultimoBackup); verificarAlertaBackup();
    }

    function importarDatos(e) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const d = JSON.parse(ev.target.result);
        productos = d.productos; clientes = d.clientes; categorias = d.categorias; historialVentas = d.historialVentas;
        guardar(); location.reload();
      };
      reader.readAsText(e.target.files[0]);
    }

    function filtrarP(v) { document.querySelectorAll(".card-prod").forEach(c => c.style.display = c.getAttribute("data-nombre").toLowerCase().includes(v.toLowerCase()) ? "block" : "none"); }
    function verCategorias() { /* Similar a versión anterior */ }
    function verClientes() { /* Similar a versión anterior */ }

    verificarAlertaBackup();
    verInventario();
  </script> 
</body> 
</html>
